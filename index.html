            border-collapse: collapse;
            width: 100%;
            max-width: 600px;

            border-radius: 8px;

        }

            background-color: #333333; 
            color: #ffffff;
            font-weight: 600;

            letter-spacing: 0.05em;

            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #333333;
        }

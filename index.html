<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 암호화폐 시세</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; 
            color: #e0e0e0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 제목 스타일 */
        h1 {
            color: #ffffff;
            margin-bottom: 10px;
        }

        /* 부제목 스타일 */
        p {
            color: #b0b0b0;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        /* 테이블 기본 스타일 */
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 600px; 
            background-color: #1e1e1e; 
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }

        /* 테이블 헤더(Th) 스타일 */
        th {
            background-color: #333333; 
            color: #ffffff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 15px;
            text-align: left;
        }

        /* 테이블 셀(Td) 스타일 */
        td {
            padding: 15px;
            border-bottom: 1px solid #333333;
        }

        th:nth-child(1), td:nth-child(1) { text-align: left; } /* Coin */
        th:nth-child(2), td:nth-child(2) { text-align: left; } /* Price */
        th:nth-child(3), td:nth-child(3) { text-align: left; } /* 24h Change */

        /* 마우스 호버 효과 */
        tr:hover td {
            background-color: #2c2c2c; 
            cursor: pointer;
        }

        tr:last-child td {
            border-bottom: none;
        }

        td:nth-child(2) {
            font-weight: bold;
            color: #81c784; 
        }
        tr:nth-child(1) td:nth-child(3) {
            color: #4caf50; 
            font-weight: bold;
        }
        tr:nth-child(2) td:nth-child(3) {
            color: #ef5350;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            table {
                font-size: 0.9em;
            }
            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <h1>실시간 암호화폐 시세</h1>
    <p>오늘의 비트코인 및 이더리움 가격</p>

    <table>
        <thead>
            <tr>
                <th>Coin</th>
                <th>Price (USD)</th>
                <th>24h Change</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Bitcoin (BTC)</td>
                <td>$64,000</td>
                <td>+1.2%</td>
            </tr>
            <tr>
                <td>Ethereum (ETH)</td>
                <td>$3,500</td>
                <td>-0.5%</td>
            </tr>
        </tbody>
    </table>

</body>
</html>

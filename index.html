<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 암호화폐 시세</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #ffffff; margin-bottom: 10px; }
        p { color: #b0b0b0; margin-bottom: 30px; font-size: 1.1em; }

        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 600px;
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        th {
            background-color: #333333;
            color: #ffffff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #333333;
        }

        tr:last-child td { border-bottom: none; }

        .price { font-weight: bold; color: #81c784; }

        .positive { color: #4caf50; font-weight: bold; }
        .negative { color: #ef5350; font-weight: bold; }

        tr:hover td {
            background-color: #2c2c2c;
            cursor: pointer;
        }

        #last-updated {
            margin-top: 15px;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>실시간 암호화폐 시세</h1>
    <p>오늘의 비트코인 및 이더리움 가격</p>

    <table>
        <thead>
            <tr>
                <th>Coin</th>
                <th>Price (USD)</th>
                <th>24h Change</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Bitcoin (BTC)</td>
                <td id="btc-price" class="price">Loading...</td>
                <td id="btc-change">Loading...</td>
            </tr>
            <tr>
                <td>Ethereum (ETH)</td>
                <td id="eth-price" class="price">Loading...</td>
                <td id="eth-change">Loading...</td>
            </tr>
        </tbody>
    </table>

    <div id="last-updated"></div>

    <script src="update.js"></script>

</body>
</html>
